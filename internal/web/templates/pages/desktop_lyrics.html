<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>music-dl desktop lyrics</title>
    <link rel="stylesheet" href="{{.Root}}/desktop_lyrics.css">
</head>
<body>
    <div class="desktop-lyrics-shell">
        <div class="desktop-lyrics-toolbar" aria-label="desktop lyrics controls">
            <button type="button" class="desktop-lyrics-btn" id="desktopLyricsMinimize" title="Minimize" aria-label="Minimize">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"/></svg>
            </button>
            <button type="button" class="desktop-lyrics-btn desktop-lyrics-close" id="desktopLyricsClose" title="Close" aria-label="Close">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
            </button>
            <button type="button" class="desktop-lyrics-btn" id="desktopLyricsColor" title="Color" aria-label="Color">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a9 9 0 0 0 0 18h1.2a1.8 1.8 0 0 0 1.3-3.1 1.5 1.5 0 0 1 1-2.6H17a4 4 0 0 0 4-4C21 6.8 17 3 12 3Z"/><circle cx="7.5" cy="11" r="1"/><circle cx="10" cy="7.5" r="1"/><circle cx="14" cy="7.5" r="1"/><circle cx="16.5" cy="11" r="1"/></svg>
            </button>
            <button type="button" class="desktop-lyrics-btn desktop-lyrics-move" id="desktopLyricsMove" title="Move" aria-label="Move">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v18M3 12h18M8 7l4-4 4 4M8 17l4 4 4-4M7 8l-4 4 4 4M17 8l4 4-4 4"/></svg>
            </button>
        </div>
        <div class="desktop-lyrics-color-panel" id="desktopLyricsColorPanel" hidden>
            <button type="button" class="desktop-lyrics-swatch" style="--swatch:#10b981;" data-color="#10b981" aria-label="Green"></button>
            <button type="button" class="desktop-lyrics-swatch" style="--swatch:#38bdf8;" data-color="#38bdf8" aria-label="Blue"></button>
            <button type="button" class="desktop-lyrics-swatch" style="--swatch:#f97316;" data-color="#f97316" aria-label="Orange"></button>
            <button type="button" class="desktop-lyrics-swatch" style="--swatch:#f43f5e;" data-color="#f43f5e" aria-label="Rose"></button>
            <input type="color" id="desktopLyricsCustomColor" value="#10b981" aria-label="Custom color">
        </div>
        <main class="desktop-lyrics-stage" id="desktopLyricsStage">
            <div class="desktop-lyrics-empty" id="desktopLyricsEmpty"></div>
            <div class="desktop-lyrics-body" id="desktopLyricsBody"></div>
        </main>
    </div>
    <script>
        window.API_ROOT = "{{.Root}}";
    </script>
    <script src="{{.Root}}/desktop_lyrics.js"></script>
</body>
</html>
